x-env-config: &env-config
  env_file:
    - ${ENV_FILE:-.env}

x-resource-limits: &resource-limits  # Add reusable resource limits
  deploy:
    resources:
      limits:
        cpus: '0.50'
        memory: 512M
services:
  postgres:
    image: postgres
    container_name: DjangoAllauth_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - DjangoAllauth_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      timeout: 5s
    <<: *resource-limits

  nginx:
    image: nginx
    container_name: DjangoAllauth_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - DjangoAllauth_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: DjangoAllauth_backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      CORS_ORIGIN_WHITELIST: ${CORS_ORIGIN_WHITELIST}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - DjangoAllauth_network
    <<: *resource-limits

  frontend:
    build: ./frontend
    container_name: DjangoAllauth_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    networks:
      - DjangoAllauth_network
    depends_on:
      - backend

networks:
  DjangoAllauth_network:
    driver: bridge

volumes:
  postgres_data:
  static_volume:
  media_volume: